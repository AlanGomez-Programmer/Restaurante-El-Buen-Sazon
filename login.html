<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    
    <title>El Buen Sazón - Login</title>
</head>

<body>
    <section class="contenedor">
        <div class="contenido">
            <div class="icono-claro-oscuro">
                <button type="button" id="btnClaro">
                    <span class="material-symbols-outlined">sunny</span>
                </button>
                <button type="button" id="btnOscuro">
                    <span class="material-symbols-outlined">mode_night</span>
                </button>
            </div>
            <div class="contenido__login">
                <div class="login__logo">
                    <img src="./icon/utensilios.png" alt="icono-utensilios">
                    <h1>INICIO DE SESION</h1>
                </div>
                <div class="login__formulario">
                    <form class="formulario__login">
                        <!-- Formulario -->
                        <label>USUARIO</label>
                        <input type="text" placeholder="Ingrese su usuario" id="usuario__login" required>
    
                        <label>CONTRASEÑA</label>
                        <input type="password" placeholder="Ingresa tu contraseña" id="contrasenia__login" required>
    
                        <button type="submit">Iniciar Sesión</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
