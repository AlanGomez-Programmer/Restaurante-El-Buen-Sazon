<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="css/sytle.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/menu.css">

    <title>El Buen Sazón - Menú Principal</title>
</head>
<body>
    <section class="contenedor">
        <div class="contenido__usuario">
            <div class="informacion__usuario">
                <p class="material-symbols-outlined">person</p>
                <h2 id="nombreUsuario"></h2>
            </div>
            <button type="button" id="btnSalir">
                <span class="material-symbols-outlined">mode_off_on</span>
            </button>
        </div>
        <div class="divider"></div>
        <div class="contenido">
            <div class="contenido__tarjetas">

                <article class="tarjeta__menu" id="btnInventario">
                    <h1>Inventario</h1>
                    <span class="material-symbols-outlined">arrow_forward_ios</span>
                </article>

                <article class="tarjeta__menu" id="btnPlatillos">
                    <h1>Platillos</h1>
                    <span class="material-symbols-outlined">arrow_forward_ios</span>
                </article>

                <article class="tarjeta__menu" id="btnPedidos">
                    <h1>Pedidos</h1>
                    <span class="material-symbols-outlined">arrow_forward_ios</span>
                </article>
            </div>
        </div>
    </section>
    <script src="./js/utils.js"></script>
    <script src="./js/persistencia.js"></script>
    <script src="./js/menu.js"></script>
</body>
</html>
