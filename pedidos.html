<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="./css/sytle.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/pedidos.css">
    <title>El Buen Sazón - Pedidos</title>
</head>
<body>

    <section class="contenedor">
        <div class="contenido__usuario">
            <div class="informacion__usuario">
                <span class="material-symbols-outlined">person</span>
                <h2 id="nombreUsuario"></h2>
            </div>
            <button type="button" id="btnSalir">
                <span class="material-symbols-outlined">mode_off_on</span>
            </button>
        </div>
        <div class="divider"></div>
        <div class="contenido">            
            <div id="contenido__menu" class="contenido__menu pantalla">
                <button type="button" id="btnRegresa-menuPrincipal">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>

                <div class="titulo">
                    <h2>Pedidos</h2>
                </div>

                <div class="contenido__tarjetas" id="menu__pedidos">

                    <button type="button" class="tarjeta__menu" id="btnRegistrarPedido">
                        <h1>Registrar Pedido</h1>
                        <span class="material-symbols-outlined">arrow_forward_ios</span>
                    </button>

                    <button type="button" class="tarjeta__menu" id="btnMostrarPedidos">
                        <h1>Mostrar Pedidos</h1>
                        <span class="material-symbols-outlined">arrow_forward_ios</span>
                    </button>

                    <button type="button" class="tarjeta__menu" id="btnActualizarPedido">
                        <h1>Actualizar Pedido</h1>
                        <span class="material-symbols-outlined">arrow_forward_ios</span>
                    </button>

                    <button type="button" class="tarjeta__menu" id="btnEliminarPedido">
                        <h1>Eliminar Pedido</h1>
                        <span class="material-symbols-outlined">arrow_forward_ios</span>
                    </button>

                </div>
            </div>

            <!-- ================= REGISTRO ================= -->
            <div id="contenido__registroPedido" class="pantalla oculto">

                <button type="button" class="btnRegresar">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>

                <div class="titulo">
                    <h1>Registro de Pedido</h1>
                </div>

                <div class="contenido__entradas">
                    <form class="formulario__entradaPedido">
                        <label>Fecha</label>
                        <input type="date" id="fechaPedido">

                        <label>Hora</label>
                        <input type="time" id="horaPedido">

                        <label>Nombre del Cliente</label>
                        <input type="text" id="nombreCliente">

                        <label>Número Teléfonico del cliente</label>
                        <input type="number" id="numeroCliente">

                        <table>
                            <thead>
                                <tr>
                                    <th>Tipo Platillo</th>
                                    <th>Platillo</th>
                                    <th>Seleccionar</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla__platillos">

                            </tbody>
                        </table>

                        <button type="button" class="btnVerde" id="btnSiguienteRegistro">Siguiente</button>

                    </form>

                    <!-- CONFIRMACION -->
                    <div class="confirmacionDatos oculto">

                        <h2>Confirmación de Datos</h2>
                        
                        <p class="codigoClienteConfirmado"></p>
                        <p class="nombreClienteConfirmado"></p>
                        <p class="numeroClienteConfirmado"></p>
                        <p class="fechaClienteConfirmado"></p>
                        <p class="horaClienteConfirmado"></p>
                        <table class="platillosConfirmados">
                            <thead>
                                <tr>
                                    <th>Tipo de Platillo</th>
                                    <th>Platillo</th>
                                </tr>
                            </thead>
                            <tbody class="cuerpoTabla__platillosConfirmados"></tbody>
                        </table>

                        <button type="button" class="btnVerde" id="btnGuardarPedido">Guardar Pedido</button>

                    </div>

                </div>
            </div>

            <!-- ================= MOSTRAR ================= -->
            <div id="contenido__mostrarPedidos" class="pantalla oculto">

                <button type="button" class="btnRegresar">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>

                <div class="titulo">
                    <h1>Pedidos</h1>
                </div>

                <div class="tarjetas__pedidos">

                </div>

            </div>

            <!-- ================= ACTUALIZAR ================= -->
            <div id="contenido__actualizarPedido" class="pantalla oculto">

                <button type="button" class="btnRegresar">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>

                <div class="titulo">
                    <h1>Actualizar Pedido</h1>
                </div>

                <form class="formulario formulario__actualizarPedido">
                    <label>Código del Pedido</label>
                    <select class="listaCodigosPedidos">
                        <option value="">Elige una opción</option>
                    </select>

                    <p>Estado del pedido</p>
                    <p class="estadoPedidoActual"></p>

                    <label>Nuevo estado del pedido</label>
                    <select class="listaEstadoPedido">
                        <option value="">Elige el Estado</option>
                        <option value="en preparacion">En Preparación</option>
                        <option value="Entregado">Entregado</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>

                    <label>Nuevo Precio</label>
                    <input type="number">

                    <button type="button" class="btnVerde" id="btnGuardarActualizar">Guardar</button>
                </form>
            </div>

            <!-- ================= ELIMINAR ================= -->
            <div id="contenido__eliminarPedido" class="pantalla oculto">
                <button type="button" class="btnRegresar">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>

                <div class="titulo">
                    <h1>Eliminar Pedido</h1>
                </div>

                <form class="formulario formulario__eliminarPedido">

                    <label>Código del Pedido</label>
                    <select class="listaCodigosPedidos">
                        <option value="">Elige una opción</option>
                    </select>

                    <div class="tarjetas__pedidos">

                    </div>

                    <button type="button" id="btnEliminar">Eliminar</button>
                </form>
            </div>

        </div>
    </section>
    <script src="./js/pedidos.js"></script>
</body>
</html>
